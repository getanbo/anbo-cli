name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - name: Install the released SDK contract
        run: |
          npm pkg set "devDependencies.@getanbo/plugin-sdk=0.2.0"
          npm install --package-lock=false
          npm pkg delete "devDependencies.@getanbo/plugin-sdk"
      - name: Verify tag and runtime release gate
        run: node scripts/check-release.mjs
      - run: npm run verify
      - run: mkdir release && npm pack --pack-destination release --silent
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-package
          path: release/*.tgz
          if-no-files-found: error

  github-release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-package
          path: release
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.tgz --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes

  npm-publish:
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-package
          path: release
      - run: npm publish release/*.tgz --access public --provenance
