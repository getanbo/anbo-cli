name: Bug report
description: Report reproducible Anbo CLI or first-party plugin behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, clone URLs, Terraform state, or unredacted events.
  - type: input
    id: component
    attributes:
      label: Component
      description: CLI, Plugin SDK, MiniStack plugin, or Cloud plugin.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Anbo, plugin, runtime image digest, Node.js, Terraform, and Docker versions as applicable.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Installed-CLI reproduction
      description: Include the exact anbo command and smallest trusted project that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted JSONL diagnostics
      description: Include stable diagnostic codes and only the relevant redacted events.
