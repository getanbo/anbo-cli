name: Promote MiniStack runtime pin

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published getanbo/anbo-ministack release tag
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Update structured runtime manifests
        env:
          ANBO_MINISTACK_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          release_manifest="$(mktemp)"
          curl --fail --silent --show-error --location --retry 3 \
            "https://github.com/getanbo/anbo-ministack/releases/download/${ANBO_MINISTACK_RELEASE_TAG}/release-manifest.json" \
            --output "$release_manifest"
          ANBO_MINISTACK_RELEASE_MANIFEST="$release_manifest" \
            node plugins/ministack/scripts/update-runtime-pin.mjs
      - name: Open digest bump pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="sync/ministack-${{ inputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add \
            plugins/ministack/runtime-manifest.json \
            plugins/ministack/fixtures/terraform-smoke/.anbo/sandbox.json
          git commit -m "chore: promote Anbo MiniStack runtime"
          git push --set-upstream origin "$branch"
          gh pr create --title "chore: promote Anbo MiniStack runtime" --body "Pins the verified Anbo MiniStack release manifest, including upstream provenance, full-image digest, and instance-isolation contract. Merge is gated on installed-CLI acceptance." --base main --head "$branch"
