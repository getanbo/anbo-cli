name: Promote MiniStack runtime pin

on:
  workflow_dispatch:
    inputs:
      digest:
        description: Candidate multi-platform index digest (sha256:...)
        required: true
      upstream_sha:
        description: Exact upstream MiniStack commit
        required: true
      upstream_version:
        description: Exact upstream MiniStack release version
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Update structured runtime manifests
        env:
          ANBO_MINISTACK_DIGEST: ${{ inputs.digest }}
          ANBO_MINISTACK_UPSTREAM_SHA: ${{ inputs.upstream_sha }}
          ANBO_MINISTACK_VERSION: ${{ inputs.upstream_version }}
          ANBO_MINISTACK_PLATFORMS: linux/amd64,linux/arm64
        run: node plugins/ministack/scripts/update-runtime-pin.mjs
      - name: Open digest bump pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="sync/ministack-${{ inputs.upstream_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add plugins/ministack/runtime-manifest.json plugins/ministack/fixtures/terraform-smoke/.anbo/sandbox.json
          git commit -m "chore: promote MiniStack runtime digest"
          git push --set-upstream origin "$branch"
          gh pr create --title "chore: promote MiniStack runtime digest" --body "Pins the exact upstream source and multi-platform index digest. Merge is gated on installed-CLI acceptance." --base main --head "$branch"
