name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-compatibility:
    name: Core compatibility (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx tsc -b --pretty false
      - run: node --test tests/unit/*.test.mjs

  plugin-quality:
    name: First-party plugin quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:plugins

  installed-cli-acceptance:
    name: Packed installed-CLI acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run test:acceptance

  package:
    name: Package contents and production audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run build
      - run: npm run test:package
      - run: npm audit --omit=dev --audit-level=high
