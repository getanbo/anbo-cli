name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANBO_CLI_REF: main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: getanbo/cli
          ref: ${{ env.ANBO_CLI_REF }}
          path: anbo-cli
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm ci
        working-directory: anbo-cli
      - run: npm run build
        working-directory: anbo-cli
      - name: Install the candidate Plugin SDK for type checking
        shell: bash
        run: |
          sdk_tarball="$(npm pack ./anbo-cli/packages/plugin-sdk --pack-destination /tmp --silent)"
          npm pkg set "devDependencies.@getanbo/plugin-sdk=file:/tmp/${sdk_tarball}"
          npm install --package-lock=false
          npm pkg delete "devDependencies.@getanbo/plugin-sdk"
      - run: npm run verify
      - run: git diff --exit-code -- package.json package-lock.json

  installed-cli:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: getanbo/cli
          ref: ${{ env.ANBO_CLI_REF }}
          path: anbo-cli
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm ci
        working-directory: anbo-cli
      - run: npm run build
        working-directory: anbo-cli
      - name: Build the plugin and pack canonical host artifacts
        id: cli
        shell: bash
        run: |
          sdk_tarball="$(npm pack ./anbo-cli/packages/plugin-sdk --pack-destination /tmp --silent)"
          npm pkg set "devDependencies.@getanbo/plugin-sdk=file:/tmp/${sdk_tarball}"
          npm install --ignore-scripts --package-lock=false
          npm run build
          npm pkg delete "devDependencies.@getanbo/plugin-sdk"
          cli_tarball="$(npm pack ./anbo-cli/packages/cli --pack-destination /tmp --silent)"
          echo "tarball=/tmp/${cli_tarball}" >> "$GITHUB_OUTPUT"
          echo "sdk_tarball=/tmp/${sdk_tarball}" >> "$GITHUB_OUTPUT"
      - name: Exercise the full runtime only through the installed CLI
        env:
          ANBO_CLI_TARBALL: ${{ steps.cli.outputs.tarball }}
          ANBO_SDK_TARBALL: ${{ steps.cli.outputs.sdk_tarball }}
          ANBO_ACCEPTANCE_RUNTIME: "1"
        run: npm run test:installed-cli
