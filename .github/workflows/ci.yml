name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: getanbo/cli
          ref: feat/plugin-host-v1
          path: .ci/anbo-cli
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build canonical plugin SDK
        run: |
          npm ci --prefix .ci/anbo-cli
          npm --prefix .ci/anbo-cli run build --workspace @getanbo/plugin-sdk
          mkdir -p node_modules/@getanbo
          ln -s "$GITHUB_WORKSPACE/.ci/anbo-cli/packages/plugin-sdk" node_modules/@getanbo/plugin-sdk
      - run: npm run check
