name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: getanbo/cli
          ref: v0.2.0
          path: .ci/anbo-cli
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Build released plugin SDK
        run: |
          npm ci --prefix .ci/anbo-cli
          npm --prefix .ci/anbo-cli run build --workspace @getanbo/plugin-sdk
          mkdir -p node_modules/@getanbo
          ln -s "$GITHUB_WORKSPACE/.ci/anbo-cli/packages/plugin-sdk" node_modules/@getanbo/plugin-sdk
      - run: npm run check
      - run: npm publish --provenance --access public
