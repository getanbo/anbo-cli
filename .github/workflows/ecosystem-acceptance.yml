name: Official plugins acceptance

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: official-plugins-${{ github.ref }}
  cancel-in-progress: false

jobs:
  installed-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact monorepo candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run build
      - name: Pack exact workspace candidates
        run: |
          mkdir -p artifacts diagnostics install projects/ministack projects/cloud
          npm pack --workspace packages/plugin-sdk --pack-destination "$GITHUB_WORKSPACE/artifacts"
          npm pack --workspace packages/plugin-testkit --pack-destination "$GITHUB_WORKSPACE/artifacts"
          npm pack --workspace packages/cli --pack-destination "$GITHUB_WORKSPACE/artifacts"
          npm pack --workspace plugins/ministack --pack-destination "$GITHUB_WORKSPACE/artifacts"
          npm pack --workspace plugins/cloud --pack-destination "$GITHUB_WORKSPACE/artifacts"
          printf '{"monorepo":"%s"}\n' "$GITHUB_SHA" > diagnostics/candidates.json
      - name: Install candidates into an empty prefix
        run: |
          printf '{"name":"anbo-official-plugins-acceptance","private":true}\n' > install/package.json
          npm install --prefix install --ignore-scripts --no-audit --no-fund "$GITHUB_WORKSPACE"/artifacts/*.tgz
          cp -R plugins/ministack/fixtures/terraform-smoke/. projects/ministack/
      - name: Run only the installed CLI
        run: node scripts/ecosystem-acceptance.mjs
        env:
          ANBO_ECOSYSTEM_INSTALL_ROOT: ${{ github.workspace }}/install
          ANBO_ECOSYSTEM_MINISTACK_ROOT: ${{ github.workspace }}/projects/ministack
          ANBO_ECOSYSTEM_CLOUD_ROOT: ${{ github.workspace }}/projects/cloud
          ANBO_ECOSYSTEM_DIAGNOSTICS: ${{ github.workspace }}/diagnostics
      - name: Upload JSONL diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: official-plugins-jsonl-${{ github.run_id }}
          path: diagnostics
          if-no-files-found: warn
          retention-days: 14
