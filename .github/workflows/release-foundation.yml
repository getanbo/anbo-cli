name: Release foundation packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact SDK/testkit version to publish
        required: true
        default: 0.2.0

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-foundation-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run check
      - run: node scripts/check-release.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}
      - run: node scripts/publish-if-missing.mjs packages/plugin-sdk
      - run: node scripts/publish-if-missing.mjs packages/plugin-testkit
